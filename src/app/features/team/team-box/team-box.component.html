<div
  class="team"
  [ngClass]="{ 'active-team': team().active, 'second-team': isSecondTeam() }"
  (click)="activate($event)"
  (touchstart)="onLongPressStart($event)"
  (touchend)="onLongPressEnd()"
  (touchcancel)="onLongPressEnd()"
  (contextmenu)="$event.preventDefault()"
  data-cy="team-box">
  @if (isSecondTeam()) {
    <div class="second-team-badge">2nd</div>
  }
  <label class="team-name-label">{{ team().name }}</label>
  <div class="team-pokemon-icons">
    @for (teamMember of team().teamMembers; track teamMember.pokemon.id) {
      <div class="pokemon-image">
        @if (!teamMember.pokemon.isDefault) {
          <img src="assets/sprites/pokemon-sv/{{ teamMember.pokemon.name }}.png" />
        }
      </div>
    }
  </div>
</div>
