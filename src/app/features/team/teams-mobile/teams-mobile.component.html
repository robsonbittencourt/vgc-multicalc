<div class="mobile-teams-container">
  <div class="mobile-teams-sticky-header">
    <div class="team-management-header">
      <label>Name</label>
      <mat-form-field appearance="outline" class="team-name-input">
        <input type="text" matInput [ngModel]="store.team().name" (input)="updateTeamName($event)" data-cy="team-name" />
      </mat-form-field>
      <div class="export-team" [class.disabled]="store.team().onlyHasDefaultPokemon()" (click)="exportPdf()" data-cy="export-pdf-button">
        <mat-icon class="icon">picture_as_pdf</mat-icon>
        <label>Team List</label>
      </div>
    </div>

    <div class="secondary-actions">
      <button mat-flat-button color="primary" (click)="addNewTeam()" data-cy="add-team-button">Create</button>
      <div class="spacer"></div>
      <app-import-pokemon-button [singlePokemon]="false" [useIconStyle]="true" (teamNameImportedEvent)="teamNameImported($event)" (pokemonImportedEvent)="pokemonImported($event)" />
      <div class="export-team" [class.disabled]="store.team().onlyHasDefaultPokemon()" (click)="export()" data-cy="export-team-button">
        <mat-icon class="icon">upload</mat-icon>
        <label>Export</label>
      </div>
      <div class="delete-team" [class.disabled]="!canDelete()" (click)="deleteTeam()" data-cy="delete-team-button">
        <mat-icon class="icon">delete</mat-icon>
        <label>Delete</label>
      </div>
    </div>
  </div>

  @if (allowSecondTeamSelection()) {
    <div class="second-team-tip">
      <mat-icon>open_with</mat-icon>
      <span>Drag a team onto another to select a second team</span>
    </div>
  }

  <div class="mobile-teams-grid">
    @for (team of visibleTeams(); track team.id) {
      <app-team-box
        [team]="team"
        [secondTeam]="secondTeamFor(team)"
        [allowSecondTeamSelection]="allowSecondTeamSelection()"
        [useDragSelection]="allowSecondTeamSelection()"
        (teamActivated)="activateTeam($event)"
        (secondTeamActivated)="activateSecondTeam($event)"
        (dragEnded)="onTeamDragEnded($event, team)"
        (secondTeamSeparated)="separateSecondTeam()" />
    }
  </div>
</div>
