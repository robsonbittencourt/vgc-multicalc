<div class="team-tabs">
  @if (editingTarget()) {
    <div class="team-tab active-tab target-tab" (click)="clearEditMode()">
      <app-pokemon-sprite [name]="editingPokemon()!.name" />
    </div>

    <div class="team-tab add-tab" (click)="clearEditMode()">
      <mat-icon>close</mat-icon>
    </div>
  } @else {
    @if (shouldShowPokemonTabs()) {
      @for (member of teamMembers(); track member.pokemon.id) {
        @if (!member.pokemon.isDefault) {
          <div
            class="team-tab"
            [ngClass]="{ 'active-tab': effectiveEditingId() === member.pokemon.id, 'second-attacker': isSecondAttacker(member.pokemon.id) }"
            (click)="setActivePokemon(member.pokemon.id)"
            (touchstart)="onTabTouchStart($event, member.pokemon.id)"
            (touchend)="onTabTouchEnd()"
            (touchcancel)="onTabTouchEnd()"
            (contextmenu)="$event.preventDefault()">
            <app-pokemon-sprite [name]="member.pokemon.name" />
            @if (isSecondAttacker(member.pokemon.id)) {
              <div class="combine-badge">
                <mat-icon>add</mat-icon>
              </div>
            }
          </div>
        }
      }

      @if (canImportPokemon() || hasDefaultMember()) {
        <div class="team-tab add-tab" [class.active-tab]="isEditingDefault()" (click)="addMember()">
          <mat-icon>add</mat-icon>
        </div>
      }
    }
  }
</div>
