<app-filterable-table
  [data]="pokemonData()"
  [selectedValues]="actualPokemon()"
  [columns]="pokemonColumns"
  [dataFilter]="dataFilter()"
  [initialValue]="pokemon().name"
  [haveFocus]="haveFocus()"
  [isMobile]="isMobile()"
  [itemSize]="isMobile() ? 65 : 45"
  (entrySelected)="pokemonSelected.emit($event)"
  (firstListEntry)="firstPokemonFromList.emit($event)"
  (escapeWasPressed)="escapeWasPressed.emit()" />
