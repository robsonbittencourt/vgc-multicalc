<div class="damage-result">
  <div>
    <div class="pokemon-hp">
      <div class="hp">
        <p class="pokemon-name">{{ pokemon.name }}</p>
        <div class="hp-bar">
          <div class="progress" [ngStyle]="{ 'width.%': hpPercentage }"></div>
          <span class="hp-value">{{ pokemon.hp - damageTaken }}/{{ pokemon.hp }}</span>
        </div>
      </div>      
      <div class="pokemon-image">
        <img src='https://img.pokemondb.net/sprites/scarlet-violet/normal/{{ pokemon.spriteName }}.png'>
      </div>
      <div class="level">
        <span>Lv. 50</span>
      </div>
    </div>
  </div>
  <div class="moves-result">
    <div class="move" *ngFor="let damageResult of damageResults">
      <mat-chip-option [selected]="pokemon.activeMoveName == damageResult.move" (click)="moveWasActivated(damageResult.move)">{{ damageResult.move }}</mat-chip-option>
      <span>{{ damageResult.result }}</span>
    </div>        
  </div>
  <div class="description-container">
    <div class="description-with-button">
      <p class="description-text">{{ activeDamageResult.description }}</p>
      <mat-icon class="copy-icon" (click)="copy(activeDamageResult.description)">content_copy</mat-icon>
      <label *ngIf="copyMessageEnabled">Copied!</label> 
    </div>        
    <p>Rolls: {{ activeDamageResult.rolls }}</p>
  </div>      
</div>
