<div class="input-column" [ngClass]="{ 'input-row': leftLabel() }">
  <label>{{ label() }}</label>
  <input #inputRef type="text" [value]="value()" (input)="onInputChange($event)" [disabled]="disabled()" (blur)="onBlur()" (focus)="onClick($event)" [tabindex]="tabIndex()" [ngClass]="{ focus: haveFocus() }" />
</div>
