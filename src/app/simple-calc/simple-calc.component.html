<div class="container">
  <app-damage-result [pokemon]="leftPokemon" [damageTaken]="leftDamageTaken" [damageResults]="leftDamageResults" (moveActivatedEvent)="leftMoveActivated()"/>
  <app-damage-result [pokemon]="rightPokemon" [damageTaken]="rightDamageTaken" [damageResults]="rightDamageResults" (moveActivatedEvent)="rightMoveActivated()"/>

  <div class="pokemon-edit">
    <app-pokemon-build [pokemon]="leftPokemon" (pokemonChangedEvent)="leftPokemonChanged()"/>
  </div>

  <div class="pokemon-edit">
    <app-pokemon-build [pokemon]="rightPokemon" (pokemonChangedEvent)="rightPokemonChanged()"/>
  </div> 

  <div class="field">
    <app-field (fieldChangedEvent)="fieldChanged()"/>
  </div>
</div>
