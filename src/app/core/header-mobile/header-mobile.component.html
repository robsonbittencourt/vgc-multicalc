<div class="header">
  <div class="left-header">
    <img class="slowking-icon" src="assets/icons/slowking.png" width="96" height="96" />
    <img class="icon" src="assets/icons/calc-72x72.png" width="72" height="72" />
    <span class="title">VGC Multi Calc</span>
  </div>
  <div class="right-header">
    <button class="menu-icon" mat-icon-button (click)="toggleMenu()">
      <mat-icon>menu</mat-icon>
    </button>
  </div>
</div>

@if (menuOpen()) {
  <div class="menu-overlay" (click)="closeMenu()"></div>
  <div class="menu-panel" [class.no-footer]="!hasFooter()">
    <div class="menu-content">
      <span class="menu-title">Pages</span>
      <button class="menu-item-button" [ngClass]="{ 'active-menu-option': menuStore.oneVsOneActivated(), pressed: pressedItemId() === '1v1' }" (click)="enableOneVsOne()">
        <span>One vs One</span>
      </button>
      <button class="menu-item-button" [ngClass]="{ 'active-menu-option': menuStore.oneVsManyActivated(), pressed: pressedItemId() === '1vMany' }" (click)="enableOneVsMany()">
        <span>Team vs Many</span>
      </button>
      <button class="menu-item-button" [ngClass]="{ 'active-menu-option': menuStore.manyVsOneActivated(), pressed: pressedItemId() === 'Manyv1' }" (click)="enableManyVsOne()">
        <span>Many vs Team</span>
      </button>
      <button class="menu-item-button" [ngClass]="{ 'active-menu-option': menuStore.speedCalculatorActivated(), pressed: pressedItemId() === 'speed' }" (click)="enableSpeedCalculator()">
        <span>Speed Calc</span>
      </button>
      <button class="menu-item-button" [ngClass]="{ 'active-menu-option': menuStore.probabilityCalcActivated(), pressed: pressedItemId() === 'probability' }" (click)="enableProbabilityCalc()">
        <span>Probability Calc</span>
      </button>
      <button class="menu-item-button" [ngClass]="{ 'active-menu-option': menuStore.typeCalcActivated(), pressed: pressedItemId() === 'type' }" (click)="enableTypeCalculator()">
        <span>Type Calc</span>
      </button>
      <button class="menu-item-button" [ngClass]="{ 'active-menu-option': menuStore.howToUseActivated(), pressed: pressedItemId() === 'howToUse' }" (click)="enableHowToUse()">
        <span>How to use</span>
      </button>

      <mat-divider></mat-divider>

      <span class="menu-title">Game</span>
      <mat-button-toggle-group [value]="store.game()" (change)="onGameChange($event)" class="game-toggle">
        <mat-button-toggle value="sv">SV</mat-button-toggle>
        <mat-button-toggle value="champions">Champions</mat-button-toggle>
      </mat-button-toggle-group>

      <mat-divider></mat-divider>

      <span class="menu-title">Themes</span>
      @for (theme of themeService.getThemes(); track theme.name) {
        <div class="menu-item" [ngClass]="{ 'active-menu-option': themeService.selectedTheme().name === theme.name, pressed: pressedItemId() === 'theme-' + theme.name }" (click)="setTheme(theme.name)">
          <div class="pokemon-image-container">
            <img class="pokemon-image" src="assets/sprites/menu/{{ theme.pokemon }}.png" width="192" height="200" loading="lazy" />
          </div>
          <span>{{ theme.name | titlecase }}</span>
        </div>
      }

      <mat-divider></mat-divider>

      <span class="menu-title">Colors</span>
      @for (color of themeService.getColors(); track color.name) {
        <div class="menu-item" [ngClass]="{ 'active-menu-option': themeService.selectedColor().name === color.name, pressed: pressedItemId() === 'color-' + color.name }" (click)="setColor(color.name)">
          <div class="pokemon-image-container">
            <img class="pokemon-image" src="assets/sprites/menu/{{ color.pokemon }}.png" width="192" height="200" loading="lazy" />
          </div>
          <span>{{ color.name | titlecase }}</span>
        </div>
      }

      <mat-divider></mat-divider>

      <button class="share-button" (click)="shareCalcs()">Share your calcs</button>

      <a class="kofi-link" href="https://ko-fi.com/B0B2VFTC3" target="_blank">
        <img src="https://storage.ko-fi.com/cdn/kofi2.png?v=3" alt="Buy Me a Coffee at ko-fi.com" />
      </a>
    </div>
  </div>
}
