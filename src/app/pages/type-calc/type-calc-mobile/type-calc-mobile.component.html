<div class="mobile-calc-container">
  <div #scrollContainer class="scrollable-content" [class.teams-tab]="activeBottomTab() === 'teams'" (scroll)="onScroll($event)">
    <div [hidden]="activeBottomTab() !== 'coverage'" [class.tab-active]="activeBottomTab() === 'coverage'">
      <app-offensive-coverage-mobile [secondTeam]="secondTeam()" />
      <app-defensive-coverage-mobile [secondTeam]="secondTeam()" />
    </div>

    <div [hidden]="activeBottomTab() !== 'insights'" [class.tab-active]="activeBottomTab() === 'insights'">
      <app-type-coverage-insights-mobile />
    </div>

    <div [hidden]="activeBottomTab() !== 'build'" [class.tab-active]="activeBottomTab() === 'build'">
      <app-team-tabs-mobile [(pokemonOnEditId)]="pokemonOnEditId" (memberAddedEvent)="onMemberAdded()" />

      <div class="attacker-build">
        @if (effectiveEditingId()) {
          <app-pokemon-build-mobile [pokemonId]="effectiveEditingId()!" [showOptimization]="false" (pokemonDeleted)="pokemonOnEditId.set($event)" />
        }
      </div>
    </div>

    <div [hidden]="activeBottomTab() !== 'teams'" [class.tab-active]="activeBottomTab() === 'teams'">
      <app-teams-mobile [allowSecondTeamSelection]="true" (pokemonSelected)="pokemonOnEditId.set($event)" (useTeam)="onTeamSelected($event)" (secondTeamSelected)="onSecondTeamSelected($event)" />
    </div>
  </div>

  <div class="bottom-nav" [class.hidden]="!showBottomNav()">
    <div class="bottom-tab" [ngClass]="{ 'active-bottom-tab': activeBottomTab() === 'coverage' }" (click)="switchTab('coverage')">
      <mat-icon>shield</mat-icon>
      <span>Coverage</span>
    </div>
    <div class="bottom-tab" [ngClass]="{ 'active-bottom-tab': activeBottomTab() === 'insights' }" (click)="switchTab('insights')">
      <mat-icon>insights</mat-icon>
      <span>Insights</span>
    </div>
    <div class="bottom-tab" [ngClass]="{ 'active-bottom-tab': activeBottomTab() === 'build' }" (click)="switchTab('build')">
      <mat-icon>edit</mat-icon>
      <span>Build</span>
    </div>
    <div class="bottom-tab" [ngClass]="{ 'active-bottom-tab': activeBottomTab() === 'teams' }" (click)="switchTab('teams')">
      <mat-icon svgIcon="pokeball"></mat-icon>
      <span>Teams</span>
    </div>
  </div>
</div>
