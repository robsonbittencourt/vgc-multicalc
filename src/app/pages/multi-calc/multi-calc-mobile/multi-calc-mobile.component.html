<div class="mobile-calc-container">
  <div [hidden]="activeBottomTab() !== 'results'" [class.tab-active]="activeBottomTab() === 'results'">
    <app-team-tabs-mobile [(pokemonOnEditId)]="pokemonOnEditId" (memberAddedEvent)="focusPokemonComboBox()" />
  </div>

  <div #scrollContainer class="scrollable-content" [class.teams-tab]="activeBottomTab() === 'teams'" [class.field-tab]="activeBottomTab() === 'field'" (scroll)="onScroll($event)">
    <div [hidden]="activeBottomTab() !== 'results'" [class.tab-active]="activeBottomTab() === 'results'">
      <div class="attacker-build">
        @if (shouldShowPokemonSelect()) {
          <div class="pokemon-select-only">
            <app-pokemon-combo-box #pokemonSelectComboBox [pokemonId]="effectiveEditingId()!" />
          </div>
        }
        @if (shouldShowBuild()) {
          <app-pokemon-build-mobile
            [pokemonId]="effectiveEditingId()!"
            [optimizationStatus]="optimizationStatus()"
            [optimizedEvs]="optimizedEvs()"
            [optimizedNature]="optimizedNature()"
            (optimizeRequested)="handleOptimizeRequest($event)"
            (optimizationApplied)="handleOptimizationApplied()"
            (optimizationDiscarded)="handleOptimizationDiscarded()"
            (pokemonDeleted)="pokemonOnEditId.set($event)" />
        }
      </div>

      <div class="results-list" cdkDropListGroup>
        @for (damageResult of damageResults(); track getExpansionKey(damageResult)) {
          <div class="result-card">
            <app-pokemon-card
              cdkDropList
              cdkDropListOrientation="horizontal"
              [cdkDropListData]="damageResult.attacker.id"
              [damageResult]="damageResult"
              [rollLevelConfig]="rollLevelConfig()"
              [isAttacker]="menuStore.manyVsOneActivated()"
              [collapsible]="true"
              [expanded]="expandedDefenderIds().has(getExpansionKey(damageResult))"
              (expandedChange)="handleExpansionToggle(getExpansionKey(damageResult), $event)"
              (cdkDropListDropped)="drop($event)"
              (targetActivated)="activateOpponent($event)"
              (attackersSeparated)="separateAttackers($event)" />
          </div>
        }

        @if (!selectPokemonActive()) {
          <app-add-pokemon-card (pokemonAddedToTeam)="addPokemonToTargets()" />

          <div class="targets-actions">
            <div class="row">
              <button mat-flat-button class="management-button" (click)="onMetaClick()" data-cy="add-meta-button">{{ metaButtonLabel() }}</button>
              <button mat-flat-button class="warn management-button" (click)="removeAll()" data-cy="delete-opponent-pokemon-button">Delete all</button>
            </div>
            <div class="row">
              <app-import-pokemon-button class="management-button" [singlePokemon]="false" (pokemonImportedEvent)="onTargetsImported($event)" />
              <button mat-flat-button class="management-button" (click)="exportPokemon()" data-cy="export-opponent-pokemon-button">Export</button>
            </div>
          </div>
        }
      </div>
    </div>

    <div [hidden]="activeBottomTab() !== 'teams'" [class.tab-active]="activeBottomTab() === 'teams'">
      <app-teams-mobile (pokemonSelected)="pokemonOnEditId.set($event)" (useTeam)="onTeamSelected($event)" />
    </div>

    <div [hidden]="activeBottomTab() !== 'field'" [class.tab-active]="activeBottomTab() === 'field'">
      <div class="widget-list">
        <app-widget class="settings-widget" [title]="'Settings'">
          <div class="field-configs">
            <div class="roll-config-section">
              <app-roll-config [(config)]="rollLevelConfig" (rollLevelChange)="handleRollLevelChange($event)" />
            </div>
            <mat-slide-toggle [checked]="order()" (change)="toggleOrder()" [labelPosition]="'before'">Order by Damage</mat-slide-toggle>
          </div>
        </app-widget>
        <app-field />
      </div>
    </div>
  </div>

  <div class="bottom-nav" [class.hidden]="!showBottomNav()">
    <div class="bottom-tab" [ngClass]="{ 'active-bottom-tab': activeBottomTab() === 'results' }" (click)="switchTab('results')">
      <mat-icon>calculate</mat-icon>
      <span>Results</span>
    </div>
    <div class="bottom-tab" [ngClass]="{ 'active-bottom-tab': activeBottomTab() === 'teams' }" (click)="switchTab('teams')">
      <mat-icon svgIcon="pokeball"></mat-icon>
      <span>Teams</span>
    </div>
    <div class="bottom-tab" [ngClass]="{ 'active-bottom-tab': activeBottomTab() === 'field' }" (click)="switchTab('field')">
      <mat-icon>settings</mat-icon>
      <span>Settings</span>
    </div>
  </div>
</div>
