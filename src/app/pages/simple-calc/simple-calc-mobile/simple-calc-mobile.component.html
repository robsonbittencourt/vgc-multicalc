<div class="mobile-calc-container">
  <div #scrollContainer class="scrollable-content" [class.field-tab]="activeBottomTab() === 'field'" [class.table-open]="showPokemonTable() || showMovesTable()">
    <div [hidden]="activeBottomTab() !== 'results'" [class.tab-active]="activeBottomTab() === 'results'" [class.table-open]="showPokemonTable() || showMovesTable()">
      <div class="team-tabs">
        <div class="team-tab" [ngClass]="{ 'active-tab': activeSide() === 'left' }" (click)="activateLeftPokemon()">
          <img class="tab-sprite" [src]="spriteService.path(store.leftPokemon().name)" />
        </div>
        <div class="team-tab" [ngClass]="{ 'active-tab': activeSide() === 'right' }" (click)="activateRightPokemon()">
          <img class="tab-sprite" [src]="spriteService.path(store.rightPokemon().name)" />
        </div>
      </div>

      <div class="attacker-header" [hidden]="showMovesTable()">
        <input #pokemonInput class="pokemon-input" [value]="inputDisplay()" (mousedown)="onPokemonMouseDown($event)" (click)="onPokemonClick()" (input)="onPokemonInput($any($event.target).value)" data-cy="pokemon-select" />
        <div class="attacker-actions">
          @if (showPokemonTable()) {
            <div class="close-table-button" (click)="onClosePokemonTable()">
              <mat-icon>close</mat-icon>
              <label>Close</label>
            </div>
          } @else {
            <app-import-pokemon-button (pokemonImportedEvent)="importPokemon($event)" />
            <app-export-pokemon-button [pokemonId]="currentPokemon().id" />
          }
        </div>
      </div>

      <div class="attacker-build">
        <app-pokemon-build-mobile
          [pokemonId]="currentPokemon().id"
          [showOptimization]="!isCurrentPokemonAttacker()"
          [optimizedEvs]="optimizedEvs()"
          [optimizedNature]="optimizedNature()"
          [optimizationStatus]="optimizationStatus()"
          [showDelete]="false"
          [manageTeamState]="false"
          [isRightSide]="activeSide() === 'right'"
          [hideEvs]="showPokemonTable() || showMovesTable()"
          [hideMoves]="showPokemonTable()"
          [editingMoves]="showMovesTable()"
          (pokemonImportedEvent)="importPokemon($event)"
          (optimizationRequested)="handleOptimizeRequest($event)"
          (optimizationApplied)="handleOptimizationApplied()"
          (optimizationDiscarded)="handleOptimizationDiscarded()"
          (evsCleared)="handleEvsCleared()"
          (editMovesRequested)="openMovesTable()"
          (closeMovesRequested)="onCloseMovesTable()" />

        @if (showPokemonTable()) {
          <div class="pokemon-table-container">
            <app-pokemon-table
              [pokemonId]="currentPokemon().id"
              [dataFilter]="pokemonDataFilter()"
              [haveFocus]="true"
              [isMobile]="true"
              (pokemonSelected)="onPokemonSelected($event)"
              (firstPokemonFromList)="firstPokemonFromList.set($event)"
              (escapeWasPressed)="onClosePokemonTable()" />
          </div>
        }

        @if (showMovesTable()) {
          <div class="moves-table-container">
            <app-moves-table
              [pokemonId]="currentPokemon().id"
              [dataFilter]="moveDataFilter()"
              [haveFocus]="true"
              [isMobile]="true"
              [moveIndex]="activeMoveIndex()"
              (moveSelected)="onMoveSelected($event)"
              (firstMoveFromList)="firstMoveFromList.set($event)"
              (escapeWasPressed)="onCloseMovesTable()" />
          </div>
        }
      </div>

      <div class="results-list" [hidden]="showPokemonTable() || showMovesTable()">
        <div class="result-card">
          <app-pokemon-card [damageResult]="damageResult()" [target]="target()" [rollLevelConfig]="rollLevelConfig()" [isAttacker]="isCurrentPokemonAttacker()" [collapsible]="false" [expanded]="true" (targetActivated)="activateRightPokemon()" />
        </div>

        <app-widget class="role-widget">
          <mat-button-toggle-group class="button-group" [value]="isCurrentPokemonAttacker() ? 'attacker' : 'defender'" (change)="toggleCurrentPokemonRole()">
            <mat-button-toggle value="attacker">Attacker</mat-button-toggle>
            <mat-button-toggle value="defender">Defender</mat-button-toggle>
          </mat-button-toggle-group>
        </app-widget>
      </div>
    </div>

    <div [hidden]="activeBottomTab() !== 'field'" [class.tab-active]="activeBottomTab() === 'field'">
      <app-widget class="settings-widget" [title]="'Settings'">
        <div class="field-configs">
          <div class="roll-config-section">
            <app-roll-config [(config)]="rollLevelConfig" (rollLevelChange)="handleRollLevelChange($event)" />
          </div>
        </div>
      </app-widget>
      <app-field />
    </div>
  </div>

  <div class="bottom-nav">
    <div class="bottom-tab" [ngClass]="{ 'active-bottom-tab': activeBottomTab() === 'results' }" (click)="switchTab('results')">
      <mat-icon>calculate</mat-icon>
      <span>Results</span>
    </div>
    <div class="bottom-tab" [ngClass]="{ 'active-bottom-tab': activeBottomTab() === 'field' }" (click)="switchTab('field')">
      <mat-icon>settings</mat-icon>
      <span>Settings</span>
    </div>
  </div>
</div>
