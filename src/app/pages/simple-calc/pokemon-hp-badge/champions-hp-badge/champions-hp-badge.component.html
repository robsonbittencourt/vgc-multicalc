<div class="hud-container">
  <svg viewBox="-22 0 500 161" class="hud-frame" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient [attr.id]="uid + '-hudBg'" gradientUnits="userSpaceOnUse" cx="450" cy="150" r="500">
        <stop offset="0%" [attr.stop-color]="isOpponent() ? '#960532' : '#1b25a3'" />
        <stop offset="100%" [attr.stop-color]="isOpponent() ? '#ff3b8a' : '#9b8dfc'" />
      </radialGradient>

      <radialGradient [attr.id]="uid + '-hudBgFainted'" gradientUnits="userSpaceOnUse" cx="450" cy="150" r="500">
        <stop offset="0%" stop-color="#1c262a" />
        <stop offset="100%" stop-color="#6c6c69" />
      </radialGradient>

      <clipPath [attr.id]="uid + '-hudClip'">
        <path [attr.d]="hudPath" />
      </clipPath>

      <clipPath [attr.id]="uid + '-hpBarClip'">
        <path d="M 166,105 L 438,105 L 427,141 L 154,141 Z" />
      </clipPath>

      <linearGradient [attr.id]="uid + '-hpGreen'" gradientUnits="userSpaceOnUse" x1="0" y1="105" x2="0" y2="141">
        <stop offset="0%" stop-color="#00FB44" />
        <stop offset="100%" stop-color="#FDFD5C" />
      </linearGradient>

      <linearGradient [attr.id]="uid + '-hpYellow'" gradientUnits="userSpaceOnUse" x1="0" y1="105" x2="0" y2="141">
        <stop offset="0%" stop-color="#FFC229" />
        <stop offset="100%" stop-color="#FFF33E" />
      </linearGradient>

      <linearGradient [attr.id]="uid + '-hpRed'" gradientUnits="userSpaceOnUse" x1="0" y1="105" x2="0" y2="141">
        <stop offset="0%" stop-color="#FF2C4D" />
        <stop offset="100%" stop-color="#CE665C" />
      </linearGradient>

      <filter [attr.id]="uid + '-shadow'" x="-5%" y="-5%" width="110%" height="110%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" />
        <feOffset dx="0" dy="1.5" result="offsetblur" />
        <feComponentTransfer>
          <feFuncA type="linear" slope="0.4" />
        </feComponentTransfer>
        <feMerge>
          <feMergeNode />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
    </defs>

    <path [attr.d]="hudPath" [attr.fill]="'url(#' + uid + '-hudBg)'" stroke="white" stroke-width="7.8" stroke-linejoin="round" [attr.filter]="'url(#' + uid + '-shadow)'" />

    <path
      [attr.d]="hudPath"
      [attr.fill]="'url(#' + uid + '-hudBgFainted)'"
      [attr.stroke]="isFainted() ? '#aaaaaa' : 'white'"
      stroke-width="7.8"
      stroke-linejoin="round"
      [class.fainted-bg]="isFainted()"
      class="fainted-bg-overlay"
      [attr.filter]="'url(#' + uid + '-shadow)'" />

    <path [attr.d]="hudPath" fill="none" stroke="#263130" stroke-width="12.5" stroke-linejoin="round" [attr.clip-path]="'url(#' + uid + '-hudClip)'" />

    <path d="M 425,20 L 485,20 L 465,105 L 394,105 Z" fill="#263130" [attr.clip-path]="'url(#' + uid + '-hudClip)'" />
    @if (canShowItemImage()) {
      <image [attr.href]="'assets/sprites/items/' + item() + '.png'" x="411" y="31" width="56" height="56" preserveAspectRatio="xMidYMid meet" [attr.clip-path]="'url(#' + uid + '-hudClip)'" />
    }

    <path d="M 166,105 L 438,105 L 427,141 L 154,141 Z" fill="rgba(0,0,0,0.35)" />
    <path [attr.d]="hpBarPath()" [attr.fill]="hpBarColor()" [attr.clip-path]="'url(#' + uid + '-hpBarClip)'" />

    <text x="141" y="70" font-family="Arial Black, sans-serif" font-weight="900" font-size="34" font-style="italic" fill="white" transform="translate(141, 70) skewX(-8) translate(-141, -70)">{{ name() }}</text>

    @if (!isFainted() && status() !== Status.HEALTHY) {
      <g app-champions-status-icon [status]="status()" transform="translate(120, 29.3)"></g>
    }

    @if (isFainted()) {
      <g app-champions-fainted-icon [animate]="shouldAnimateFainted()" transform="translate(120, 29.3)"></g>
    }

    <text
      x="360"
      y="153"
      text-anchor="end"
      font-family="Arial Black, sans-serif"
      font-weight="900"
      font-size="45"
      font-style="italic"
      fill="white"
      stroke="#0e115e"
      stroke-width="5"
      paint-order="stroke"
      transform="translate(368, 153) skewX(-8) translate(-367, -153)">
      {{ remainingHp() }}
    </text>
    <text
      x="427"
      y="153"
      text-anchor="end"
      font-family="Arial Black, sans-serif"
      font-weight="900"
      font-size="30"
      font-style="italic"
      fill="white"
      stroke="#0e115e"
      stroke-width="5"
      paint-order="stroke"
      transform="translate(420, 153) skewX(-8) translate(-420, -153)">
      /{{ hpBase() }}
    </text>

    <image [attr.href]="spriteDataUrl()" x="16" y="28" width="120" height="120" preserveAspectRatio="xMidYMid meet" />
  </svg>

  <div class="pokemon-image-loader">
    <img #pokemonImage [src]="'assets/sprites/pokemon-champions/' + spriteName() + '.png'" (load)="onImageLoad()" />
  </div>
</div>
