<app-team class="team" [pokemonId]="pokemonId()" />

<app-teams-desktop />
<app-field onlySpeed="true" />

@if (!isPokemonDefault()) {
  <div class="speed-list" [class.hide-insights]="isChampions()">
    <app-speed-list (pokemonSelected)="selectedPokemon.set($event)" />
    @if (!isChampions()) {
      <app-speed-insights [pokemon]="selectedPokemon()" />
    }
  </div>
}
